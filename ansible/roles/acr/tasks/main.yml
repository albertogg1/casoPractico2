---
# =============================================================
# roles/acr/tasks/main.yml - Gestión de imágenes en el ACR
# =============================================================
# Se ejecuta en localhost (WSL)
# Descarga imágenes de DockerHub, las etiqueta y las sube al ACR
# =============================================================

# -------------------------------------------------------------
# 1. LOGIN EN EL ACR
# -------------------------------------------------------------
# Nos autenticamos en el ACR para poder hacer push de imágenes
# Equivale a: podman login acrcasopractico2.azurecr.io
- name: Login en el ACR
  containers.podman.podman_login:
    registry: "{{ acr_login_server }}"
    username: "{{ acr_username }}"
    password: "{{ acr_password }}"

# -------------------------------------------------------------
# 2. PULL DE IMAGEN NGINX DESDE DOCKERHUB
# -------------------------------------------------------------
# Descargamos la imagen de NGINX desde el repositorio público
# Equivale a: podman pull docker.io/library/nginx:latest
- name: Pull imagen NGINX desde DockerHub
  containers.podman.podman_image:
    name: docker.io/library/nginx
    tag: latest
    state: present

# -------------------------------------------------------------
# 3. TAG DE LA IMAGEN NGINX
# -------------------------------------------------------------
# Renombramos la imagen con la URL de nuestro ACR
# Equivale a: podman tag nginx:latest acr.azurecr.io/nginx:latest
- name: Tag imagen NGINX para el ACR
  containers.podman.podman_tag:
    image: docker.io/library/nginx:latest
    target_names:
      - "{{ acr_login_server }}/nginx:casoPractico2"

# -------------------------------------------------------------
# 4. PUSH DE LA IMAGEN NGINX AL ACR
# -------------------------------------------------------------
# Subimos la imagen renombrada a nuestro ACR privado
# Equivale a: podman push acr.azurecr.io/nginx:latest
- name: Push imagen NGINX al ACR
  containers.podman.podman_image:
    name: "{{ acr_login_server }}/nginx:casoPractico2"
    push: true
    state: present

# -------------------------------------------------------------
# REDIS
# -------------------------------------------------------------
- name: Pull imagen Redis desde DockerHub
  containers.podman.podman_image:
    name: docker.io/library/redis
    tag: 6.0.8
    state: present

- name: Tag imagen Redis para el ACR
  containers.podman.podman_tag:
    image: docker.io/library/redis:6.0.8
    target_names:
      - "{{ acr_login_server }}/redis:casoPractico2"

- name: Push imagen Redis al ACR
  containers.podman.podman_image:
    name: "{{ acr_login_server }}/redis:casoPractico2"
    push: true
    state: present

# -------------------------------------------------------------
# AZURE VOTE FRONT
# -------------------------------------------------------------
- name: Pull imagen azure-vote-front desde DockerHub
  containers.podman.podman_image:
    name: docker.io/jsosa15/azure-vote-front
    tag: v1
    state: present

- name: Tag imagen azure-vote-front para el ACR
  containers.podman.podman_tag:
    image: docker.io/jsosa15/azure-vote-front:v1
    target_names:
      - "{{ acr_login_server }}/azure-vote-front:casoPractico2"

- name: Push imagen azure-vote-front al ACR
  containers.podman.podman_image:
    name: "{{ acr_login_server }}/azure-vote-front:casoPractico2"
    push: true
    state: present